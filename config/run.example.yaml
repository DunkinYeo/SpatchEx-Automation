platform: android

run:
  name: "spatch_ex_longrun"
  duration_hours: 24
  symptom_interval_hours: 4
  start_immediately: true

android:
  appium_server_url: "http://127.0.0.1:4723"
  device_name: "Android"
  udid: ""                # set if multiple devices are connected
  app_package: "com.example.spatch"   # TODO: set real package
  app_activity: ".MainActivity"       # TODO: set real activity
  no_reset: true
  new_command_timeout: 3600

selectors:
  android:
    # ── Measurement start ─────────────────────────────────────────────
    start_now_text: "Start Now"
    consent_agree_text: "Agree"
    use_spatch_text: "Use S-Patch"
    duration_sheet_title: "Select a test period"
    duration_24h_text: "24 Hours"
    duration_48h_text: "48 Hours"
    duration_72h_text: "72 Hours"
    confirm_text: "Confirm"

    # ── Offline mode (leave blank if your app has no offline path) ────
    offline_mode_text: "Offline"          # text/badge that indicates offline state
    offline_checkbox_id: ""               # resource-id of the consent checkbox
    offline_agree_text: "I Agree"         # fallback text if no resource-id
    offline_confirm_text: ""              # separate confirm button (if any)

    # ── Running screen ────────────────────────────────────────────────
    symptom_add_text: "Add Symptom"       # button on the main ECG screen

    # ── Symptom picker ────────────────────────────────────────────────
    symptom_picker_title: "Check your symptoms"
    symptom_confirm_text: ""              # submit button inside picker (leave blank if auto-closes)
    symptom_done_text: ""                 # final journal button (leave blank if not present)
    symptom_success_signal_text: ""       # toast/dialog confirming symptom was saved

    # ── Other (free-text) input ───────────────────────────────────────
    other_text_field_id: ""              # resource-id of the EditText (preferred)
    keyboard_done_text: "Done"           # IME action button label to dismiss keyboard

    # ── Activity picker ───────────────────────────────────────────────
    add_activity_text: "Add Activity"
    activity_submit_text: "Add Activity"

# symptom_plan: exact hour offsets.  Leave empty to use interval + catalog.
symptom_plan:
  - at_hour: 4
    symptoms: ["Palpitations"]
    other_text: ""
    activities: []
  - at_hour: 8
    symptoms: ["Chest Pain"]
    other_text: "mild after walking"
    activities: ["Walking"]

symptom_catalog:
  - "Chest Pain"
  - "Palpitations"
  - "Dizziness"
  - "Short Breath"
  - "Loss of Consciousness"
  - "Blurred Vision"
  - "Vertigo"
  - "Dizziness on Standing"
  - "Arm/Neck/Shoulder Discomfort"
  - "Other"

activity_catalog:
  - "Desk work / computer use"
  - "Watching TV / reading"
  - "Walking"
  - "Light jogging"
  - "Running"
  - "Swimming"
  - "Intense exercise"
  - "Argument / stress"
  - "Sleeping"
  - "Eating"
  - "Caffeine intake"
  - "Alcohol intake"

slack:
  enabled: false
  webhook_url: ""
  mention: ""

# ── Hub (team dashboard) ──────────────────────────────────────────────────────
# Enter the hub server URL (manager's PC) to send test results to the team
# dashboard in real time (/team page on the manager's machine).
hub:
  enabled: false
  url: ""          # e.g. http://192.168.1.100:5001
  tester_name: ""  # name shown on the dashboard (e.g. Alice)
