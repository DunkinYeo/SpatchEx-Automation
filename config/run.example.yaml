# ─────────────────────────────────────────────────────────────────────────────
# SpatchEx Automation — Example Config
# Copy this file to config/my-app.yaml and fill in the required fields.
# Run with: python main.py --config config/my-app.yaml
# ─────────────────────────────────────────────────────────────────────────────

platform: android   # only "android" is supported

# ── Run settings ─────────────────────────────────────────────────────────────
run:
  name: "spatch_ex_longrun"   # used for output folder / log naming
  duration_hours: 24          # total test duration (24 / 48 / 72)
  symptom_interval_hours: 4   # how often to inject a symptom automatically
  start_immediately: true     # if false, waits for the first interval before injecting

  # Optional: add random jitter to each scheduled injection time
  # e.g. 300 = ±5 minutes — keeps injections from landing on exact boundaries
  jitter_seconds: 0

  # Optional: suppress injections during low-activity hours
  # start/end are decimal hours (e.g. 23.0 = 11 PM, 6.0 = 6 AM)
  # Supports overnight windows (start > end), e.g. 23–6
  # quiet_hours:
  #   start: 23.0
  #   end:   6.0

# ── Android / Appium connection ───────────────────────────────────────────────
android:
  # [REQUIRED] Appium server address — default is localhost:4723
  appium_server_url: "http://127.0.0.1:4723"

  # platformName and automationName are set automatically to
  # "Android" and "UiAutomator2" — no need to set them here.

  # [REQUIRED] Device identifier — run `adb devices` to find yours
  device_name: "Android"        # human-readable label (any string)
  udid: ""                      # serial from `adb devices` (required if >1 device)

  # [REQUIRED] Target app identifiers
  # Find with: adb shell dumpsys window | grep mCurrentFocus
  app_package:  "com.example.app"   # e.g. com.wellysis.spatchcardio.ex
  app_activity: ".MainActivity"     # e.g. com.wellysis.spatchcardio.ex.MainActivity

  no_reset: true                # true = keep app data between sessions
  new_command_timeout: 3600     # seconds before Appium drops idle session

# ── UI selectors ──────────────────────────────────────────────────────────────
# Each value can be a string or a list of strings (tried in order).
# Use a list to support both app language variants, e.g. ["OK", "확인"].
selectors:
  android:
    # ── Measurement start ──────────────────────────────────────────────
    start_now_text:         "Start Now"
    consent_agree_text:     ["Agree", "동의"]
    use_spatch_text:        ["Use S-Patch", "S-Patch 사용하기"]
    duration_sheet_title:   ["Select a test period", "검사 기간을 선택해주세요"]
    duration_24h_text:      ["24 Hours", "24 시간"]
    duration_48h_text:      ["48 Hours", "48 시간"]
    duration_72h_text:      ["72 Hours", "72 시간"]
    confirm_text:           ["Confirm", "OK", "확인"]

    # ── Offline mode (leave blank if your app has no offline path) ─────
    offline_mode_text:      ["Offline", "오프라인"]
    offline_checkbox_id:    ""          # resource-id of consent checkbox
    offline_agree_text:     ["I Agree", "동의합니다"]
    offline_confirm_text:   ""          # separate confirm button (if any)

    # ── Running screen ─────────────────────────────────────────────────
    symptom_add_text:       ["Add Symptom", "증상 추가"]

    # ── Symptom picker ─────────────────────────────────────────────────
    symptom_picker_title:   ["Check your symptoms", "증상을 선택해주세요."]
    symptom_confirm_text:   ""          # submit button inside picker (blank = auto-closes)
    symptom_done_text:      ""          # final journal button (blank = not present)
    symptom_success_signal_text: ""     # toast/dialog confirming save (blank = skip check)

    # ── Other (free-text) input ────────────────────────────────────────
    other_text_field_id:    ""          # resource-id of the EditText (preferred)
    keyboard_done_text:     ["Done", "완료"]

    # ── Activity picker ────────────────────────────────────────────────
    add_activity_text:      ["Add Activity", "활동 추가"]
    activity_submit_text:   ["Add Activity", "활동 추가"]

# ── Symptom plan ──────────────────────────────────────────────────────────────
# Define exact injection times (hours after test start).
# Leave empty ([]) to use interval-based random injection from symptom_catalog.
symptom_plan:
  - at_hour: 4
    symptoms: ["Palpitations"]
    other_text: ""
    activities: []
  - at_hour: 8
    symptoms: ["Chest Pain"]
    other_text: "mild after walking"
    activities: ["Walking"]

# ── Symptom catalog ───────────────────────────────────────────────────────────
# Used when symptom_plan is empty — one is picked at random each interval.
symptom_catalog:
  - "Chest Pain"
  - "Palpitations"
  - "Dizziness"
  - "Short Breath"
  - "Loss of Consciousness"
  - "Blurred Vision"
  - "Vertigo"
  - "Dizziness on Standing"
  - "Arm/Neck/Shoulder Discomfort"
  - "Other"

activity_catalog:
  - "Desk work / computer use"
  - "Watching TV / reading"
  - "Walking"
  - "Light jogging"
  - "Running"
  - "Swimming"
  - "Intense exercise"
  - "Argument / stress"
  - "Sleeping"
  - "Eating"
  - "Caffeine intake"
  - "Alcohol intake"

# ── Recovery settings (optional) ─────────────────────────────────────────────
# Controls the 3-step escalating recovery triggered when Appium session or
# UI health checks fail before a job runs.
#   Step 1: press Back key + short wait
#   Step 2: start_activity (force relaunch)
#   Step 3: terminate + activate (kill / relaunch)
# After each step the driver waits cooldown_seconds, then re-checks UI health.
recovery:
  cooldown_seconds_between_steps: 30   # wait time between each recovery step

# ── Artifact settings (optional) ─────────────────────────────────────────────
artifacts:
  output_dir: "artifacts"              # root directory for all run outputs
  # collect_logcat_on controls when adb logcat is captured:
  #   every_job  — capture after every injection (verbose; useful for debugging)
  #   on_failure — capture only when an injection fails (recommended default)
  collect_logcat_on: "on_failure"

# ── Reporting settings (optional) ────────────────────────────────────────────
reporting:
  html_report: true                    # generate summary.html after the run
  # Slack webhook (optional) — leave blank to disable
  # slack:
  #   webhook_url: "https://hooks.slack.com/services/..."
  #   channel: "#qa-alerts"
  #   mention: "@here"

# ── Slack notifications (optional) ───────────────────────────────────────────
slack:
  enabled: false
  webhook_url: ""
  mention: ""

# ── Hub / team dashboard (optional) ──────────────────────────────────────────
# Set enabled: true and enter the manager's PC address to send real-time
# results to the /team dashboard page.
hub:
  enabled: false
  url: ""           # e.g. http://192.168.1.100:5001
  tester_name: ""   # name shown on the dashboard (e.g. Alice)
