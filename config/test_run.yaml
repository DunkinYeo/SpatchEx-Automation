platform: android

run:
  name: "spatch_ex_test"
  duration_hours: 1
  symptom_interval_hours: 0.02
  start_immediately: true

android:
  appium_server_url: "http://127.0.0.1:4723"
  device_name: "Pixel 7"
  udid: "55ETQWBXYE1RA1"
  app_package: "com.wellysis.spatchcardio.ex"
  app_activity: "com.wellysis.spatchcardio.ex.MainActivity"
  no_reset: true
  new_command_timeout: 300

selectors:
  android:
    start_now_text: "Start Now"
    consent_agree_text: ["Agree", "동의"]
    use_spatch_text: ["Use S-Patch", "S-Patch 사용하기"]
    duration_sheet_title: ["Select a test period", "검사 기간을 선택해주세요"]
    duration_24h_text: ["24 Hours", "24 시간"]
    duration_48h_text: ["48 Hours", "48 시간"]
    duration_72h_text: ["72 Hours", "72 시간"]
    confirm_text: ["Confirm", "OK", "확인"]
    offline_mode_text: ["Offline", "오프라인"]
    offline_checkbox_id: ""
    offline_agree_text: ["I agree", "동의합니다"]
    offline_confirm_text: ""
    symptom_add_text: ["Add Symptom", "증상 추가"]
    symptom_picker_title: ["Check your symptoms", "증상을 선택해주세요."]
    # symptom_confirm_text: not set -> English app auto-closes picker
    # symptom_done_text: not set -> English app skips journal screen
    other_text_field_id: ""
    keyboard_done_text: ["Done", "완료"]
    add_activity_text: ["Add Activity", "활동 추가"]
    activity_submit_text: ["Add Activity", "활동 추가"]

symptom_plan: []

symptom_catalog:
  - "Chest Pain"
  - "Palpitations"
  - "Dizziness"
  - "Short Breath"

slack:
  enabled: false
  webhook_url: ""
  mention: ""
