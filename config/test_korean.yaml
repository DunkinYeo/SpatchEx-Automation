platform: android
run:
  name: "korean_device_test"
  duration_hours: 1
  symptom_interval_hours: 1
  start_immediately: true

android:
  appium_server_url: "http://127.0.0.1:4723"
  device_name: "Samsung Korean"
  udid: "RF9Y800127R"
  app_package: "com.wellysis.spatchcardio.ex"
  app_activity: "com.wellysis.spatchcardio.ex.MainActivity"
  no_reset: true
  new_command_timeout: 3600

selectors:
  android:
    # measurement start flow
    start_now_text: ["Start Now", "지금 시작", "시작하기"]
    consent_agree_text: ["동의", "Agree"]
    use_spatch_text: ["S-Patch 사용하기", "Use S-Patch"]
    duration_sheet_title: ["검사 기간을 선택해주세요.", "Select a test period"]
    duration_24h_text: ["24 시간", "24 Hours"]
    confirm_text: ["확인", "Confirm", "OK", "닫기", "계속"]

    # main running screen
    main_tab_text: ["My ECG", "나의 ECG", "나의 심전도"]
    symptom_add_text: ["증상 추가", "Add Symptom"]

    # symptom picker
    symptom_picker_title: ["증상을 선택해주세요.", "Check your symptoms"]

symptom_plan: []

# bilingual pairs: tries Korean first (Korean device), falls back to English
symptom_catalog:
  - ["가슴 통증", "Chest Pain"]
  - ["두근거림", "Palpitations"]
  - ["어지러움", "Dizziness"]
  - ["호흡 가파름", "Short Breath"]

slack:
  enabled: false
  webhook_url: ""
  mention: ""
