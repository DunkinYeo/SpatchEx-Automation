<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Failures — SpatchEx</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1e3a5f;
      color: white;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.3px; }
    header a { color: #93c5fd; font-size: 0.85rem; text-decoration: none; }
    header a:hover { text-decoration: underline; }

    main { max-width: 860px; margin: 32px auto; padding: 0 20px; }

    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; color: #1e3a5f; }

    .empty {
      background: white;
      border-radius: 10px;
      padding: 40px;
      text-align: center;
      color: #6b7280;
      border: 1px solid #e5e7eb;
    }
    .empty p { margin-top: 8px; font-size: 0.9rem; }

    .card {
      background: white;
      border-radius: 10px;
      border: 1px solid #fca5a5;
      border-left: 4px solid #ef4444;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .card-left { display: flex; flex-direction: column; gap: 4px; }

    .card-ts {
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a2e;
    }

    .card-files {
      font-size: 0.8rem;
      color: #6b7280;
    }

    .btn {
      display: inline-block;
      padding: 7px 18px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      background: #1e3a5f;
      color: white;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn:hover { background: #2d5282; }
  </style>
</head>
<body>

<header>
  <h1>SpatchEx — Failure Artifacts</h1>
  <a href="/">← Back to Dashboard</a>
</header>

<main>
  <h2>Recent Failures</h2>

  {% if not folders %}
  <div class="empty">
    <strong>No failures recorded yet.</strong>
    <p>Artifact folders will appear here whenever a test fails.</p>
  </div>
  {% else %}
  {% for f in folders %}
  <div class="card">
    <div class="card-left">
      <span class="card-ts">{{ f.label }}</span>
      <span class="card-files">{{ f.files | join(' &nbsp;·&nbsp; ') | safe }}</span>
    </div>
    <a class="btn" href="/failures/{{ f.name }}">View</a>
  </div>
  {% endfor %}
  {% endif %}
</main>

</body>
</html>
