<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S-Patch EX Long-Run Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1e3a5f;
      color: white;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.3px; }
    .header-chips { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    /* ── Chips ── */
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 500; white-space: nowrap;
    }
    .chip-ok    { background: rgba(16,185,129,.18); color: #34d399; border: 1px solid rgba(52,211,153,.3); }
    .chip-err   { background: rgba(239,68,68,.18);  color: #f87171; border: 1px solid rgba(248,113,113,.3); }
    .chip-warn  { background: rgba(245,158,11,.18); color: #fbbf24; border: 1px solid rgba(251,191,36,.3); }
    .chip-blue  { background: rgba(59,130,246,.18); color: #60a5fa; border: 1px solid rgba(96,165,250,.3); }

    /* ── Layout ── */
    main {
      max-width: 980px;
      margin: 24px auto;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 760px) { main { grid-template-columns: 1fr; } }

    /* ── Card ── */
    .card {
      background: white;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.04);
    }
    .card-title {
      font-size: .95rem; font-weight: 700; color: #1e3a5f;
      border-bottom: 2px solid #e8f0fe;
      padding-bottom: 10px; margin-bottom: 18px;
    }

    /* ── Form fields ── */
    .field { margin-bottom: 16px; }
    .field > label {
      display: block; font-size: .82rem; font-weight: 600;
      color: #4b5563; margin-bottom: 6px;
    }
    .field select, .field input[type=text] {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid #d1d5db; border-radius: 9px;
      font-size: .88rem; background: #fafafa; color: #1a1a2e;
      transition: border-color .15s;
    }
    .field select:focus, .field input:focus {
      outline: none; border-color: #3b82f6; background: white;
    }

    /* ── Duration toggle buttons ── */
    .btn-group { display: flex; gap: 7px; flex-wrap: wrap; }
    .btn-toggle {
      padding: 8px 16px;
      border: 1.5px solid #d1d5db; border-radius: 9px;
      font-size: .83rem; cursor: pointer;
      background: white; color: #555;
      transition: all .15s;
    }
    .btn-toggle:hover { border-color: #3b82f6; color: #3b82f6; }
    .btn-toggle.active {
      background: #2563eb; border-color: #2563eb;
      color: white; font-weight: 600;
    }

    /* ── Symptom checkboxes ── */
    .symptom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .symptom-label {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px;
      border: 1.5px solid #d1d5db; border-radius: 9px;
      cursor: pointer; font-size: .85rem;
      user-select: none; transition: all .15s;
    }
    .symptom-label:hover { border-color: #93c5fd; }
    .symptom-label input[type=checkbox] { display: none; }
    .symptom-label .checkmark {
      width: 16px; height: 16px; border: 2px solid #d1d5db;
      border-radius: 4px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .symptom-label.checked { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; font-weight: 500; }
    .symptom-label.checked .checkmark { background: #2563eb; border-color: #2563eb; }
    .symptom-label.checked .checkmark::after { content: 'v'; color: white; font-size: .7rem; font-weight: 700; }

    /* ── Action buttons ── */
    .action-row { margin-top: 20px; display: flex; gap: 10px; }
    .btn-primary {
      flex: 1; padding: 13px;
      background: #2563eb; color: white;
      border: none; border-radius: 10px;
      font-size: .95rem; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
    .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }
    .btn-stop {
      padding: 13px 18px;
      background: white; color: #dc2626;
      border: 1.5px solid #dc2626; border-radius: 10px;
      font-size: .88rem; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .btn-stop:hover { background: #fef2f2; }
    .btn-secondary {
      padding: 7px 14px;
      background: white; color: #2563eb;
      border: 1.5px solid #2563eb; border-radius: 8px;
      font-size: .8rem; font-weight: 500; cursor: pointer;
    }
    .btn-secondary:hover { background: #eff6ff; }

    /* ── Progress ── */
    #progress-section { margin-bottom: 14px; }
    .progress-bar {
      height: 8px; background: #e5e7eb;
      border-radius: 4px; overflow: hidden; margin: 6px 0 4px;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 4px; transition: width .8s ease;
    }
    .progress-meta {
      display: flex; justify-content: space-between;
      font-size: .76rem; color: #6b7280;
    }

    /* ── Next inject box ── */
    #next-inject-box {
      background: #eff6ff; border: 1px solid #bfdbfe;
      border-radius: 9px; padding: 10px 14px;
      font-size: .82rem; color: #1d4ed8;
      margin-bottom: 12px;
    }

    /* ── Log ── */
    .log-wrap {
      border: 1px solid #e5e7eb; border-radius: 10px;
      background: #fafafa; max-height: 520px; overflow-y: auto;
    }
    .log-empty {
      padding: 48px 20px; text-align: center;
      color: #9ca3af; font-size: .88rem;
    }
    .log-item {
      display: grid; grid-template-columns: 62px 1fr;
      gap: 10px; padding: 9px 14px;
      border-bottom: 1px solid #f3f4f6; font-size: .81rem;
    }
    .log-item:last-child { border-bottom: none; }
    .log-time { color: #9ca3af; font-variant-numeric: tabular-nums; padding-top: 1px; }
    .log-item.green  .log-msg { color: #059669; }
    .log-item.red    .log-msg { color: #dc2626; }
    .log-item.blue   .log-msg { color: #2563eb; }
    .log-item.purple .log-msg { color: #7c3aed; }
    .log-item.gray   .log-msg { color: #6b7280; }

    /* ── Appium warning banner ── */
    #appium-warn {
      background: #fef3c7; border: 1px solid #fcd34d;
      border-radius: 9px; padding: 10px 14px;
      font-size: .82rem; color: #92400e;
      margin-bottom: 14px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
  </style>
</head>
<body>

<header>
  <h1>S-Patch EX Long-Run Test</h1>
  <div class="header-chips">
    <span class="chip chip-warn" id="appium-chip">Checking Appium...</span>
    <span class="chip chip-warn" id="run-chip">Idle</span>
  </div>
</header>

<main>
  <!-- ── Left: Config ── -->
  <div>
    <div class="card">
      <div class="card-title">Test Settings</div>

      <!-- Appium warning -->
      <div id="appium-warn" style="display:none">
        Appium server is not running.
        <button class="btn-secondary" onclick="startAppium()">Start Appium</button>
      </div>

      <!-- Device -->
      <div class="field">
        <label>Connected Device</label>
        <select id="device-select">
          <option value="">Detecting devices...</option>
        </select>
      </div>

      <!-- Device Connection Mode (optional) -->
      <div class="field">
        <label>Device Connection <span style="color:#9ca3af;font-weight:400">(optional)</span></label>
        <div style="display:flex;gap:12px;align-items:center">
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:400">
            <input type="radio" name="conn-mode" value="usb" checked id="conn-usb"> USB
          </label>
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-weight:400">
            <input type="radio" name="conn-mode" value="wifi" id="conn-wifi"> WiFi ADB
          </label>
        </div>
        <div id="wifi-addr-row" style="display:none;margin-top:6px">
          <input type="text" id="wifi-addr" placeholder="e.g. 192.168.0.50:5555" style="width:100%">
        </div>
      </div>

      <!-- Run name -->
      <div class="field">
        <label>Test Name <span style="color:#9ca3af;font-weight:400">(used in result files)</span></label>
        <input type="text" id="run-name" placeholder="e.g. Alice_UAT_Round1" value="uat_run">
      </div>

      <!-- Hub (optional) -->
      <div class="field">
        <label>Team Hub URL <span style="color:#9ca3af;font-weight:400">(optional, given by test manager)</span></label>
        <input type="text" id="hub-url" placeholder="e.g. http://192.168.1.100:5001" value="">
      </div>
      <div class="field">
        <label>Your Name <span style="color:#9ca3af;font-weight:400">(shown on team dashboard)</span></label>
        <input type="text" id="tester-name" placeholder="e.g. Alice" value="">
      </div>

      <!-- Duration -->
      <div class="field">
        <label>Test Duration</label>
        <div class="btn-group" id="duration-group">
          <button class="btn-toggle" data-val="1">1h</button>
          <button class="btn-toggle active" data-val="24">24h</button>
          <button class="btn-toggle" data-val="48">48h</button>
          <button class="btn-toggle" data-val="72">72h</button>
        </div>
        <input type="hidden" id="duration-val" value="24">
      </div>

      <!-- Interval -->
      <div class="field">
        <label>Injection Interval</label>
        <select id="interval-select">
          <option value="1">Every 1 hour</option>
          <option value="2">Every 2 hours</option>
          <option value="4" selected>Every 4 hours</option>
          <option value="8">Every 8 hours</option>
          <option value="12">Every 12 hours</option>
        </select>
      </div>

      <!-- Symptoms -->
      <div class="field">
        <label>Symptoms to Inject</label>
        <div class="symptom-grid" id="symptom-grid">
          <label class="symptom-label checked">
            <input type="checkbox" value="Chest Pain" checked>
            <span class="checkmark"></span>Chest Pain
          </label>
          <label class="symptom-label checked">
            <input type="checkbox" value="Palpitations" checked>
            <span class="checkmark"></span>Palpitations
          </label>
          <label class="symptom-label checked">
            <input type="checkbox" value="Dizziness" checked>
            <span class="checkmark"></span>Dizziness
          </label>
          <label class="symptom-label checked">
            <input type="checkbox" value="Short Breath" checked>
            <span class="checkmark"></span>Short Breath
          </label>
        </div>
      </div>

      <div class="action-row">
        <button class="btn-primary" id="start-btn">&#9654; Start Test</button>
        <button class="btn-stop" id="stop-btn" style="display:none" onclick="stopTest()">&#9632; Stop</button>
      </div>
    </div>
  </div>

  <!-- ── Right: Log ── -->
  <div>
    <div class="card">
      <div class="card-title">Progress</div>

      <!-- Progress bar -->
      <div id="progress-section" style="display:none">
        <div style="font-size:.81rem;color:#6b7280">
          Elapsed: <strong id="elapsed-text">-</strong> / <span id="total-text">-</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <div class="progress-meta">
          <span id="progress-pct">0%</span>
          <span id="run-name-display" style="color:#9ca3af"></span>
        </div>
      </div>

      <!-- Next inject -->
      <div id="next-inject-box" style="display:none">
        Next injection: <strong id="next-inject-time">-</strong>
      </div>

      <!-- Event log -->
      <div class="log-wrap" id="log-wrap">
        <div class="log-empty" id="log-empty">Start a test to see logs here.</div>
      </div>
    </div>
  </div>
</main>

<script>
// ── Event display config ──────────────────────────────────────────────────────
const EVENT_INFO = {
  run_start:                   { text: 'Test started',                color: 'blue'   },
  appium_connect:              { text: 'Appium connected',            color: 'blue'   },
  ensure_measurement_started:  { text: 'Checking measurement...',     color: 'gray'   },
  measurement_already_running: { text: 'Measurement already running', color: 'green'  },
  measurement_confirmed_running:{ text: 'Measurement confirmed',      color: 'green'  },
  measurement_started:         { text: 'Measurement started',         color: 'green'  },
  tapping_start_now:           { text: 'Tapping Start Now',           color: 'gray'   },
  offline_mode_detected:       { text: 'Offline mode detected',       color: 'gray'   },
  scheduler_started:           { text: 'Scheduler started',           color: 'blue'   },
  ui_health_check:             { text: 'UI health check...',          color: 'gray'   },
  ui_health_ok:                { text: 'UI health OK',                color: 'green'  },
  ui_health_check_failed:      { text: 'UI issue — attempting recovery', color: 'red' },
  session_check_failed:        { text: 'Session error — recovering',  color: 'red'    },
  recovery_step_1:             { text: 'Recovery step 1: back key',   color: 'gray'   },
  recovery_step_2:             { text: 'Recovery step 2: restart activity', color: 'gray' },
  recovery_step_3:             { text: 'Recovery step 3: force relaunch', color: 'gray' },
  session_recovered:           { text: null,                          color: 'green'  },
  session_recovery_failed:     { text: 'Recovery failed',             color: 'red'    },
  inject_symptom_start:        { text: null,                          color: 'purple' },
  inject_symptom_done:         { text: null,                          color: 'green'  },
  inject_symptom_failed:       { text: 'Symptom injection failed',    color: 'red'    },
  schedule_add:                { text: null,                          color: 'gray'   },
  artifact_logcat_start:       { text: null,                          color: 'gray'   },
  artifact_logcat_done:        { text: null,                          color: 'gray'   },
  run_complete:                { text: 'Test complete!',              color: 'green'  },
  run_failed:                  { text: null,                          color: 'red'    },
};

function fmtEvent(ev) {
  const info = EVENT_INFO[ev.event] || { text: ev.event, color: 'gray' };
  let text = info.text;

  if (ev.event === 'inject_symptom_start') {
    const s = (ev.data?.symptoms || []).join(', ');
    text = `Injecting: ${s}`;
  } else if (ev.event === 'inject_symptom_done') {
    const sec = ev.data?.elapsed_sec ?? '?';
    text = `Injection complete (${sec}s)`;
  } else if (ev.event === 'schedule_add') {
    const d = ev.data || {};
    const t = d.run_at ? new Date(d.run_at).toLocaleTimeString() : '-';
    text = `Next injection scheduled -> ${t}`;
  } else if (ev.event === 'session_recovered') {
    const step = ev.data?.recovery_step ?? '?';
    text = `Recovery succeeded (step ${step})`;
  } else if (ev.event === 'artifact_logcat_start') {
    return null;
  } else if (ev.event === 'artifact_logcat_done') {
    return null;
  } else if (ev.event === 'ui_health_check') {
    return null;
  } else if (ev.event === 'run_failed') {
    text = `Test failed -- ${ev.data?.error || ''}`;
  }
  return { text: text || ev.event, color: info.color };
}

// ── State ────────────────────────────────────────────────────────────────────
let pollTimer   = null;
let seenEvents  = 0;
let runStartTs  = null;

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  const r = await fetch('/api/init').then(r => r.json());
  updateAppiumUI(r.appium);
  populateDevices(r.devices);

  const s = await fetch('/api/status').then(r => r.json());
  if (s.events.length > 0) {
    renderLog(s.events, true);
    updateProgress(s.events);
    updateNextInject(s.events);
  }
  if (s.running) {
    setUIRunning(true);
    startPolling();
  } else if (s.exit_code !== null && s.exit_code !== undefined) {
    showFinished(s.exit_code);
  }

  // Auto-fill Team Hub URL if field is empty.
  // If opened via localhost / 127.0.0.1, fetch LAN IP from /api/local-ip
  // so the URL is reachable by other devices on the same network.
  const hubField = document.getElementById('hub-url');
  if (!hubField.value) {
    const host = window.location.hostname;
    const isLocal = (host === 'localhost' || host === '127.0.0.1');
    if (isLocal) {
      try {
        const li = await fetch('/api/local-ip').then(r => r.json());
        hubField.value = li.ip ? `http://${li.ip}:${li.port}` : window.location.origin;
      } catch (_) {
        hubField.value = window.location.origin;
      }
    } else {
      hubField.value = window.location.origin;
    }
  }
}

function updateAppiumUI(ok) {
  const chip = document.getElementById('appium-chip');
  chip.className = 'chip ' + (ok ? 'chip-ok' : 'chip-err');
  chip.textContent  = ok ? 'Appium connected' : 'Appium not found';
  document.getElementById('appium-warn').style.display = ok ? 'none' : 'flex';
}

function populateDevices(devices) {
  const sel = document.getElementById('device-select');
  sel.innerHTML = '';
  if (!devices.length) {
    sel.innerHTML = '<option value="">No device connected</option>';
  } else {
    devices.forEach(d => {
      const o = document.createElement('option');
      o.value = o.textContent = d;
      sel.appendChild(o);
    });
  }
}

// ── Duration toggle ──────────────────────────────────────────────────────────
document.getElementById('duration-group').addEventListener('click', e => {
  const btn = e.target.closest('.btn-toggle');
  if (!btn) return;
  document.querySelectorAll('#duration-group .btn-toggle').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('duration-val').value = btn.dataset.val;
});

// ── WiFi mode toggle ─────────────────────────────────────────────────────────
document.querySelectorAll('input[name="conn-mode"]').forEach(r => {
  r.addEventListener('change', () => {
    document.getElementById('wifi-addr-row').style.display =
      document.getElementById('conn-wifi').checked ? 'block' : 'none';
  });
});

// ── Symptom toggle ──────────────────────────────────────────────────────────
document.getElementById('symptom-grid').addEventListener('click', e => {
  const lbl = e.target.closest('.symptom-label');
  if (!lbl) return;
  const cb = lbl.querySelector('input');
  cb.checked = !cb.checked;
  lbl.classList.toggle('checked', cb.checked);
});

// ── Appium start ─────────────────────────────────────────────────────────────
async function startAppium() {
  const btn = document.querySelector('#appium-warn button');
  btn.textContent = 'Starting...'; btn.disabled = true;
  const r = await fetch('/api/appium/start', { method: 'POST' }).then(r => r.json());
  btn.textContent = 'Start Appium'; btn.disabled = false;
  if (r.error) { alert(r.error); return; }
  updateAppiumUI(r.running);
}

// ── Start test ────────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', async () => {
  const device = document.getElementById('device-select').value;
  if (!device) { alert('Please select a connected device.'); return; }

  const symptoms = [...document.querySelectorAll('#symptom-grid input:checked')].map(c => c.value);
  if (!symptoms.length) { alert('Please select at least one symptom.'); return; }

  const wifiMode = document.getElementById('conn-wifi').checked;
  const wifiAddr = (document.getElementById('wifi-addr').value || '').trim();
  if (wifiMode && !wifiAddr) { alert('Please enter the Device Address (IP:Port) for WiFi ADB.'); return; }

  const body = {
    device,
    run_name:       document.getElementById('run-name').value || 'uat_run',
    duration_hours: parseInt(document.getElementById('duration-val').value),
    interval_hours: parseFloat(document.getElementById('interval-select').value),
    symptoms,
    hub_url:        (document.getElementById('hub-url').value || '').trim(),
    tester_name:    (document.getElementById('tester-name').value || '').trim(),
    wifi_mode:      wifiMode,
    wifi_addr:      wifiMode ? wifiAddr : '',
  };

  const r = await fetch('/api/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  }).then(r => r.json());

  if (r.error) { alert(r.error); return; }

  seenEvents  = 0;
  runStartTs  = null;
  document.getElementById('log-wrap').innerHTML =
    '<div class="log-empty" id="log-empty">Waiting for logs...</div>';
  document.getElementById('progress-section').style.display = 'none';
  document.getElementById('next-inject-box').style.display  = 'none';

  setUIRunning(true);
  startPolling();
});

// ── Stop test ─────────────────────────────────────────────────────────────────
async function stopTest() {
  if (!confirm('Stop the test?')) return;
  await fetch('/api/stop', { method: 'POST' });
  stopPolling();
  setUIRunning(false);
  const chip = document.getElementById('run-chip');
  chip.className = 'chip chip-warn'; chip.textContent = 'Stopped';
}

// ── UI state ──────────────────────────────────────────────────────────────────
function setUIRunning(running) {
  document.getElementById('start-btn').disabled = running;
  document.getElementById('stop-btn').style.display = running ? '' : 'none';
  const chip = document.getElementById('run-chip');
  chip.className = 'chip ' + (running ? 'chip-blue' : 'chip-warn');
  chip.textContent = running ? 'Running' : 'Idle';
}

function showFinished(code) {
  const chip = document.getElementById('run-chip');
  chip.className = 'chip ' + (code === 0 ? 'chip-ok' : 'chip-err');
  chip.textContent = code === 0 ? 'Complete' : 'Failed';
}

// ── Polling ───────────────────────────────────────────────────────────────────
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  poll();
  pollTimer = setInterval(poll, 2000);
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function poll() {
  let s;
  try { s = await fetch('/api/status').then(r => r.json()); }
  catch { return; }

  renderLog(s.events);
  updateProgress(s.events);
  updateNextInject(s.events);

  if (!s.running && pollTimer) {
    stopPolling();
    setUIRunning(false);
    showFinished(s.exit_code ?? -1);
  }
}

// ── Log rendering ─────────────────────────────────────────────────────────────
function renderLog(events, reset = false) {
  if (!events?.length) return;
  const wrap  = document.getElementById('log-wrap');

  if (reset) { wrap.innerHTML = ''; seenEvents = 0; }

  if (events.length > seenEvents) {
    if (seenEvents === 0) wrap.innerHTML = '';

    for (let i = seenEvents; i < events.length; i++) {
      const ev = events[i];
      const fmt = fmtEvent(ev);
      if (!fmt) continue;
      const { text, color } = fmt;
      const time = ev.ts ? ev.ts.split('T')[1].slice(0, 8) : '';

      const div = document.createElement('div');
      div.className = `log-item ${color}`;
      div.innerHTML = `<span class="log-time">${time}</span><span class="log-msg">${text}</span>`;
      wrap.appendChild(div);
    }
    seenEvents = events.length;
    wrap.scrollTop = wrap.scrollHeight;
  }
}

// ── Progress ──────────────────────────────────────────────────────────────────
function updateProgress(events) {
  const startEv = events?.find(e => e.event === 'run_start');
  if (!startEv) return;

  document.getElementById('progress-section').style.display = '';

  const tH = startEv.data?.duration_hours || 24;
  if (!runStartTs) runStartTs = new Date(startEv.ts);

  const elapsedMs = Date.now() - runStartTs.getTime();
  const pct       = Math.min(100, (elapsedMs / (tH * 3_600_000)) * 100);
  const elH = Math.floor(elapsedMs / 3_600_000);
  const elM = Math.floor((elapsedMs % 3_600_000) / 60_000);

  document.getElementById('progress-fill').style.width = pct.toFixed(1) + '%';
  document.getElementById('progress-pct').textContent  = pct.toFixed(1) + '%';
  document.getElementById('elapsed-text').textContent  = `${elH}h ${elM}m`;
  document.getElementById('total-text').textContent    = `${tH}h`;
  document.getElementById('run-name-display').textContent =
    document.getElementById('run-name').value || '';
}

// ── Next inject ───────────────────────────────────────────────────────────────
function updateNextInject(events) {
  const box  = document.getElementById('next-inject-box');
  const time = document.getElementById('next-inject-time');

  let runAt = null;
  for (let i = (events?.length ?? 0) - 1; i >= 0; i--) {
    const ev = events[i];
    if (ev.event === 'schedule_add' && ev.data?.run_at) {
      runAt = ev.data.run_at; break;
    }
  }

  if (runAt && new Date(runAt) > new Date()) {
    box.style.display = '';
    time.textContent  = new Date(runAt).toLocaleTimeString();
  } else {
    box.style.display = 'none';
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>
